<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#2f9e63" />
  <meta name="description" content="La tua lista della spesa, semplice e sempre con te." />
  <title>Lista della spesa</title>

  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./icons/icon-180.png" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app">

    <!-- Intestazione -->
    <header class="header">
      <div class="brand">
        <span class="brand-icon" aria-hidden="true">🛒</span>
        <h1>Lista della spesa</h1>
      </div>
      <div class="header-right">
        <span id="count" class="count" title="Articoli da comprare">0</span>
      </div>
    </header>

    <!-- Barra di ricerca -->
    <div class="search-wrap">
      <div class="search-box">
        <span class="search-icon" aria-hidden="true">🔍</span>
        <input
          id="search"
          type="search"
          inputmode="search"
          autocomplete="off"
          autocapitalize="none"
          placeholder="Cerca o aggiungi un prodotto…"
          aria-label="Cerca o aggiungi un prodotto"
        />
        <button id="clear-search" class="clear-search" aria-label="Cancella ricerca" hidden>✕</button>
      </div>
    </div>

    <!-- Contenuto -->
    <main id="content" class="content">
      <!-- Riempito dinamicamente da app.js -->
    </main>

    <!-- Stato sincronizzazione -->
    <footer class="status">
      <span id="status-dot" class="status-dot"></span>
      <span id="status-text">Avvio…</span>
    </footer>
  </div>

  <!-- Toast per annullare -->
  <div id="toast" class="toast" hidden>
    <span id="toast-text"></span>
    <button id="toast-undo" class="toast-undo">Annulla</button>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
